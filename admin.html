<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<title>Painel Admin</title>

<style>
body {
  background: radial-gradient(circle at top left,
    #2a2a2a 0%,
    #121212 40%,
    #000000 100%);
}
</style>
</head>

<body class="text-gray-200 min-h-screen flex items-center justify-center">

<div id="app" class="w-full max-w-md p-8 rounded-3xl border border-gray-800
                    bg-gradient-to-b from-gray-900 to-black shadow-2xl">

  <h2 class="text-2xl font-bold mb-6 text-center">Login Admin</h2>

  <input id="email"
    placeholder="Email"
    class="w-full p-3 mb-4 rounded-xl bg-gray-800 border border-gray-700">

  <input id="password"
    type="password"
    placeholder="Senha"
    class="w-full p-3 mb-4 rounded-xl bg-gray-800 border border-gray-700">

  <button id="loginBtn"
    class="w-full bg-gradient-to-r from-gray-300 via-white to-gray-300
           text-black p-3 rounded-xl font-semibold hover:opacity-90">
    Entrar
  </button>

  <div id="msg" class="mt-4 text-sm text-center"></div>

</div>

<script>
const SUPABASE_URL = "https://jyrgpvozcsuydfvwdbso.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cmdwdm96Y3N1eWRmdndkYnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMzc5NDYsImV4cCI6MjA4NzYxMzk0Nn0.UaO49Ie82pbSosiaLo84NgNBiTXLoQfnzrgEhB6HjFw";

if(!window.supabase){
  document.getElementById("msg").innerHTML =
    "<span class='text-red-400'>Erro carregando Supabase.</span>";
} else {

  const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  const loginBtn = document.getElementById("loginBtn");

  loginBtn.onclick = async function(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.innerHTML = "Entrando...";

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if(error){
      msg.innerHTML =
        "<span class='text-red-400'>" + error.message + "</span>";
      return;
    }

    // Se login funcionou, mostra painel
    showPanel();
  };

  async function showPanel(){

    const { data: orders } = await supabase
      .from("orders")
      .select("*")
      .eq("status","pending");

    document.getElementById("app").innerHTML = `
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">Pedidos Pendentes</h2>
        <button id="logout"
          class="text-sm text-gray-400 hover:text-white">
          Sair
        </button>
      </div>

      ${
        !orders || orders.length === 0
        ? `<p class="text-gray-500">Nenhum pedido pendente.</p>`
        : orders.map(o=>`
            <div class="p-4 mb-4 rounded-xl border border-gray-800 bg-black">
              <p><b>${o.kit_title}</b></p>
              <p class="text-gray-400 text-sm">${o.mc_nick}</p>

              <div class="mt-3 flex gap-3">
                <button onclick="approve('${o.id}')"
                  class="px-4 py-1 rounded bg-green-600">
                  Aprovar
                </button>

                <button onclick="deny('${o.id}')"
                  class="px-4 py-1 rounded bg-red-600">
                  Negar
                </button>
              </div>
            </div>
        `).join("")
      }
    `;

    document.getElementById("logout").onclick = async function(){
      await supabase.auth.signOut();
      location.reload();
    };

    window.approve = async function(id){
      await supabase.from("orders")
        .update({status:"approved"})
        .eq("id",id);
      showPanel();
    };

    window.deny = async function(id){
      await supabase.from("orders")
        .update({status:"denied"})
        .eq("id",id);
      showPanel();
    };
  }
}
</script>

</body>
</html>
