<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<title>Painel Admin</title>

<style>
body{
  background: linear-gradient(135deg,#1e1e1e,#000000);
}
.card{
  background: rgba(0,0,0,0.7);
  border:1px solid #2a2a2a;
}
</style>
</head>

<body class="text-gray-200 min-h-screen">

<div id="loginBox"
     class="max-w-md mx-auto mt-24 p-8 rounded-3xl card shadow-xl">

  <h2 class="text-2xl font-bold mb-6 text-center">Login Admin</h2>

  <input id="email"
    placeholder="Email"
    class="w-full p-3 mb-4 rounded bg-gray-800">

  <input id="password"
    type="password"
    placeholder="Senha"
    class="w-full p-3 mb-4 rounded bg-gray-800">

  <button id="loginBtn"
    class="w-full py-3 bg-gray-300 text-black rounded font-semibold">
    Entrar
  </button>

  <div id="msg" class="mt-4 text-sm text-center"></div>
</div>

<div id="panelBox" class="hidden max-w-6xl mx-auto px-6 py-10"></div>

<script>
const SUPABASE_URL = "https://jyrgpvozcsuydfvwdbso.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cmdwdm96Y3N1eWRmdndkYnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMzc5NDYsImV4cCI6MjA4NzYxMzk0Nn0.UaO49Ie82pbSosiaLo84NgNBiTXLoQfnzrgEhB6HjFw";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const loginBox = document.getElementById("loginBox");
const panelBox = document.getElementById("panelBox");

document.getElementById("loginBtn").onclick = async function(){

  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error){
    msg.innerHTML = `<span class='text-red-400'>${error.message}</span>`;
  } else {
    loginBox.classList.add("hidden");
    panelBox.classList.remove("hidden");
    loadPanel();
  }
};

async function loadPanel(){

  const { data: settings } = await supabase
    .from("site_settings")
    .select("*")
    .eq("id",1)
    .single();

  const { data: kits } = await supabase.from("kits").select("*");
  const { data: coupons } = await supabase.from("coupons").select("*");
  const { data: orders } = await supabase.from("orders").select("*");

  panelBox.innerHTML = `
  <div class="flex justify-between items-center mb-10">
    <h1 class="text-3xl font-bold">Painel Admin</h1>
    <button onclick="logout()" class="px-4 py-2 bg-red-600 rounded">Sair</button>
  </div>

  <div class="card p-6 rounded-2xl mb-8">
    <h2 class="text-xl font-bold mb-4">Configurações da Loja</h2>

    <input id="storeName" value="${settings.site_name}"
      class="w-full p-2 mb-3 rounded bg-gray-800">

    <div class="flex gap-3 mb-3">
      <input id="color1" type="color" value="${settings.gradient_color_1}">
      <input id="color2" type="color" value="${settings.gradient_color_2}">
    </div>

    <input id="banner" value="${settings.banner_url || ''}"
      class="w-full p-2 mb-3 rounded bg-gray-800">

    <button onclick="saveSettings()"
      class="px-6 py-2 bg-green-600 rounded">Salvar</button>
  </div>

  <div class="card p-6 rounded-2xl mb-8">
    <h2 class="text-xl font-bold mb-4">Criar Kit</h2>

    <input id="kitTitle" placeholder="Título"
      class="w-full p-2 mb-2 rounded bg-gray-800">

    <input id="kitDesc" placeholder="Descrição"
      class="w-full p-2 mb-2 rounded bg-gray-800">

    <input id="kitPrice" type="number" placeholder="Preço"
      class="w-full p-2 mb-2 rounded bg-gray-800">

    <input id="kitImage" placeholder="URL da Imagem"
      class="w-full p-2 mb-3 rounded bg-gray-800">

    <button onclick="createKit()"
      class="px-6 py-2 bg-blue-600 rounded">Criar Kit</button>

    <h3 class="mt-6 font-bold">Kits Existentes</h3>
    ${kits.map(k=>`
      <div class="mt-2 p-3 border border-gray-700 rounded">
        ${k.title}
        <button onclick="deleteKit('${k.id}')"
          class="ml-3 text-red-400">Excluir</button>
      </div>
    `).join("")}
  </div>

  <div class="card p-6 rounded-2xl mb-8">
    <h2 class="text-xl font-bold mb-4">Criar Cupom</h2>

    <input id="couponCode" placeholder="Código"
      class="w-full p-2 mb-2 rounded bg-gray-800">

    <input id="couponDiscount" type="number" placeholder="% Desconto"
      class="w-full p-2 mb-3 rounded bg-gray-800">

    <button onclick="createCoupon()"
      class="px-6 py-2 bg-purple-600 rounded">Criar Cupom</button>
  </div>

  <div class="card p-6 rounded-2xl">
    <h2 class="text-xl font-bold mb-4">Pedidos</h2>

    ${orders.map(o=>`
      <div class="mt-2 p-4 border border-gray-700 rounded">
        <b>${o.kit_title}</b> - ${o.mc_nick}
        <p>Status: ${o.status}</p>
        ${
          o.status==="pending"
          ? `
            <button onclick="approve('${o.id}')"
              class="px-3 py-1 bg-green-600 rounded mr-2">Aprovar</button>
            <button onclick="deny('${o.id}')"
              class="px-3 py-1 bg-red-600 rounded">Negar</button>
          `
          : ""
        }
      </div>
    `).join("")}
  </div>
  `;

  window.saveSettings = async ()=>{
    await supabase.from("site_settings").update({
      site_name:storeName.value,
      gradient_color_1:color1.value,
      gradient_color_2:color2.value,
      banner_url:banner.value
    }).eq("id",1);
    alert("Salvo!");
  };

  window.createKit = async ()=>{
    await supabase.from("kits").insert({
      title:kitTitle.value,
      description:kitDesc.value,
      price_cents:parseFloat(kitPrice.value)*100,
      image_url:kitImage.value,
      is_active:true
    });
    loadPanel();
  };

  window.deleteKit = async (id)=>{
    await supabase.from("kits").delete().eq("id",id);
    loadPanel();
  };

  window.createCoupon = async ()=>{
    await supabase.from("coupons").insert({
      code:couponCode.value,
      discount_percent:parseInt(couponDiscount.value),
      active:true
    });
    loadPanel();
  };

  window.approve = async (id)=>{
    await supabase.from("orders").update({status:"approved"}).eq("id",id);
    loadPanel();
  };

  window.deny = async (id)=>{
    await supabase.from("orders").update({status:"denied"}).eq("id",id);
    loadPanel();
  };

  window.logout = async ()=>{
    await supabase.auth.signOut();
    panelBox.classList.add("hidden");
    loginBox.classList.remove("hidden");
  };
}
</script>

</body>
</html>
