<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<title>Painel Admin</title>

<style>
body {
  background: linear-gradient(135deg,#1e1e1e,#000000);
}
</style>
</head>

<body class="text-gray-200 min-h-screen flex items-center justify-center">

<div id="loginBox"
     class="w-full max-w-md p-8 rounded-3xl border border-gray-800
            bg-black/70 shadow-2xl">

  <h2 class="text-2xl font-bold mb-6 text-center">Login Admin</h2>

  <input id="email"
    placeholder="Email"
    class="w-full p-3 mb-4 rounded-xl bg-gray-800 border border-gray-700">

  <input id="password"
    type="password"
    placeholder="Senha"
    class="w-full p-3 mb-4 rounded-xl bg-gray-800 border border-gray-700">

  <button id="loginBtn"
    class="w-full bg-gray-300 text-black p-3 rounded-xl font-semibold">
    Entrar
  </button>

  <div id="msg" class="mt-4 text-sm text-center"></div>
</div>

<div id="panelBox" class="hidden max-w-5xl mx-auto px-6 py-10"></div>

<script>
const SUPABASE_URL = "https://jyrgpvozcsuydfvwdbso.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cmdwdm96Y3N1eWRmdndkYnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMzc5NDYsImV4cCI6MjA4NzYxMzk0Nn0.UaO49Ie82pbSosiaLo84NgNBiTXLoQfnzrgEhB6HjFw";

if(!window.supabase){
  document.getElementById("msg").innerHTML =
    "<span class='text-red-400'>Erro carregando Supabase</span>";
} else {

  const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  const loginBox = document.getElementById("loginBox");
  const panelBox = document.getElementById("panelBox");

  document.getElementById("loginBtn").onclick = async function(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if(error){
      document.getElementById("msg").innerHTML =
        "<span class='text-red-400'>" + error.message + "</span>";
    } else {
      loginBox.classList.add("hidden");
      panelBox.classList.remove("hidden");
      loadPanel();
    }
  };

  async function loadPanel(){

    const { data: orders } = await supabase
      .from("orders")
      .select("*");

    panelBox.innerHTML = `
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Painel Admin</h2>
        <button onclick="logout()"
          class="px-4 py-2 bg-red-600 rounded">
          Sair
        </button>
      </div>

      ${
        !orders || orders.length === 0
        ? "<p class='text-gray-400'>Nenhum pedido.</p>"
        : orders.map(o=>`
          <div class="p-4 mb-4 rounded-xl border border-gray-800 bg-black">
            <p><b>${o.kit_title}</b></p>
            <p class="text-gray-400">${o.mc_nick}</p>
            <p>Status: ${o.status}</p>
          </div>
        `).join("")
      }
    `;
  }

  window.logout = async function(){
    await supabase.auth.signOut();
    panelBox.classList.add("hidden");
    loginBox.classList.remove("hidden");
  };
}
</script>

</body>
</html>
