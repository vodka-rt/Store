<!doctype html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-black text-gray-200 min-h-screen flex items-center justify-center">

<div id="app" class="w-full max-w-md"></div>

<script>
const SUPABASE_URL = "https://jyrgpvozcsuydfvwdbso.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5cmdwdm96Y3N1eWRmdndkYnNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMzc5NDYsImV4cCI6MjA4NzYxMzk0Nn0.UaO49Ie82pbSosiaLo84NgNBiTXLoQfnzrgEhB6HjFw";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const kitId = new URLSearchParams(location.search).get("kit");

function money(c){
  return (c/100).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

async function load(){

  const { data: kit } = await supabase
    .from("kits")
    .select("*")
    .eq("id",kitId)
    .single();

  let finalPrice = kit.price_cents;

  document.getElementById("app").innerHTML = `
    <div class="p-8 bg-black/60 rounded-3xl border border-gray-800">

      <h2 class="text-2xl font-bold mb-4">${kit.title}</h2>

      <input id="mc" placeholder="Nick Minecraft"
        class="w-full p-2 mb-3 rounded bg-gray-800">

      <input id="real" placeholder="Nome Real"
        class="w-full p-2 mb-3 rounded bg-gray-800">

      <input id="discord" placeholder="@Discord"
        class="w-full p-2 mb-3 rounded bg-gray-800">

      <input id="coupon" placeholder="Cupom (opcional)"
        class="w-full p-2 mb-3 rounded bg-gray-800">

      <div id="price" class="mb-4 font-bold">
        ${money(finalPrice)}
      </div>

      <button id="buyBtn"
        class="w-full py-3 rounded bg-gray-300 text-black font-semibold">
        Finalizar Compra
      </button>

      <div id="msg" class="mt-4 text-sm"></div>
    </div>
  `;

  document.getElementById("coupon").onblur = async function(){
    const code = this.value;
    if(!code) return;

    const { data: coupon } = await supabase
      .from("coupons")
      .select("*")
      .eq("code",code)
      .eq("active",true)
      .single();

    if(coupon){
      finalPrice = kit.price_cents *
        (1 - coupon.discount_percent/100);
      document.getElementById("price").innerHTML =
        money(finalPrice);
    }
  };

  document.getElementById("buyBtn").onclick = async function(){

    await supabase.from("orders").insert({
      kit_title: kit.title,
      final_amount_cents: Math.round(finalPrice),
      mc_nick: document.getElementById("mc").value,
      real_name: document.getElementById("real").value,
      discord_handle: document.getElementById("discord").value,
      status: "pending"
    });

    document.getElementById("msg").innerHTML =
      "<span class='text-green-400'>Pedido criado! Aguarde aprovação.</span>";
  };
}

load();
</script>

</body>
</html>
