<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<title>Bedrock Store</title>

<style>
  body {
    background: linear-gradient(
      180deg,
      #1a1a1a 0%,
      #0f0f0f 40%,
      #000000 100%
    );
  }
</style>
</head>

<body class="text-gray-200 min-h-screen">

<!-- HEADER -->
<header class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
  <h1 class="text-2xl font-bold tracking-wide">
    BEDROCK STORE
  </h1>

  <button id="adminOpen"
    class="px-5 py-2 rounded-xl bg-gradient-to-r from-gray-800 via-gray-700 to-gray-800
           hover:from-gray-700 hover:to-gray-600 transition shadow-lg">
    Admin
  </button>
</header>

<!-- HERO -->
<section id="hero" class="max-w-6xl mx-auto px-6 mt-8"></section>

<!-- KITS -->
<section class="max-w-6xl mx-auto px-6 mt-14">
  <h2 class="text-3xl font-bold mb-10">Kits Disponíveis</h2>
  <div id="kits" class="grid md:grid-cols-3 gap-8"></div>
</section>

<!-- MODAL ADMIN -->
<div id="adminModal"
     class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">

  <div class="bg-gradient-to-b from-gray-900 to-black
              border border-gray-700 shadow-2xl
              rounded-3xl p-10 w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6">Painel Admin</h2>

    <input id="email"
      placeholder="Email"
      class="w-full p-3 mb-4 rounded-xl bg-gray-800 border border-gray-700">

    <input id="password"
      type="password"
      placeholder="Senha"
      class="w-full p-3 mb-4 rounded-xl bg-gray-800 border border-gray-700">

    <button id="loginBtn"
      class="w-full bg-gradient-to-r from-gray-300 via-white to-gray-300
             text-black p-3 rounded-xl font-semibold hover:opacity-90 transition">
      Entrar
    </button>

    <button id="closeModal"
      class="mt-4 w-full text-sm text-gray-400 hover:text-white transition">
      Cancelar
    </button>

    <div id="loginMsg" class="mt-4 text-sm"></div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const SUPABASE_URL = "COLE_SUA_URL_AQUI";
  const SUPABASE_ANON_KEY = "COLE_SUA_ANON_KEY_AQUI";

  const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  function money(c){
    return (c/100).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
  }

  async function loadSite(){
    const { data: settings } = await supabase
      .from("site_settings")
      .select("*")
      .eq("id",1)
      .single();

    const { data: kits } = await supabase
      .from("kits")
      .select("*")
      .eq("is_active",true);

    document.getElementById("hero").innerHTML = `
      <div class="rounded-3xl p-12 border border-gray-800 shadow-xl
                  bg-gradient-to-br from-gray-900 via-black to-gray-900">
        <h2 class="text-4xl font-bold">${settings.site_name}</h2>
        <p class="mt-4 text-gray-400">${settings.notices}</p>

        <a href="${settings.discord_invite_url || '#'}" target="_blank"
          class="mt-8 inline-block px-8 py-3 rounded-xl
                 bg-gradient-to-r from-gray-300 via-white to-gray-300
                 text-black font-semibold hover:opacity-90 transition">
          Entrar no Discord
        </a>
      </div>
    `;

    document.getElementById("kits").innerHTML = kits.map(k=>`
      <div class="p-8 rounded-3xl border border-gray-800
                  bg-gradient-to-b from-gray-900 to-black
                  hover:scale-[1.03] transition shadow-xl">

        <h3 class="text-xl font-semibold">${k.title}</h3>
        <p class="text-gray-400 mt-3">${k.description || ""}</p>

        <div class="mt-6 text-2xl font-bold">
          ${money(k.price_cents)}
        </div>

        <a href="./buy.html?kit=${k.id}"
          class="mt-8 block text-center py-3 rounded-xl
                 bg-gradient-to-r from-gray-300 via-white to-gray-300
                 text-black font-semibold hover:opacity-90 transition">
          Comprar
        </a>
      </div>
    `).join("");
  }

  loadSite();

  /* =====================
     ADMIN BUTTON FIX
  ===================== */

  const modal = document.getElementById("adminModal");
  const adminBtn = document.getElementById("adminOpen");

  adminBtn.addEventListener("click", function(){
    modal.classList.remove("hidden");
  });

  document.getElementById("closeModal").addEventListener("click", function(){
    modal.classList.add("hidden");
  });

  document.getElementById("loginBtn").addEventListener("click", async function(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("loginMsg");

    msg.innerHTML = "Entrando...";

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if(error){
      msg.innerHTML = `<span class="text-red-400">${error.message}</span>`;
    } else {
      window.location.href = "./admin.html";
    }
  });

});
</script>

</body>
</html>
