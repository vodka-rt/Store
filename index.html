<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<title>Bedrock Store</title>

<style>
  body {
    background: linear-gradient(180deg, #111111 0%, #000000 100%);
  }
</style>
</head>

<body class="text-gray-200 min-h-screen">

<!-- HEADER -->
<header class="max-w-6xl mx-auto px-4 py-6 flex justify-between items-center">
  <h1 id="logo" class="text-2xl font-bold tracking-wide cursor-pointer">
    BEDROCK STORE
  </h1>

  <button id="adminOpen"
    class="text-sm px-4 py-2 rounded-lg bg-gradient-to-r from-gray-800 to-gray-700 hover:from-gray-700 hover:to-gray-600 transition">
    Admin
  </button>
</header>

<!-- HERO -->
<section id="hero" class="max-w-6xl mx-auto px-4 mt-6"></section>

<!-- KITS -->
<section class="max-w-6xl mx-auto px-4 mt-12">
  <h2 class="text-3xl font-bold mb-8">Kits Disponíveis</h2>
  <div id="kits" class="grid md:grid-cols-3 gap-6"></div>
</section>

<!-- LOGIN MODAL -->
<div id="adminModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
  <div class="bg-gradient-to-b from-gray-900 to-black p-8 rounded-2xl w-full max-w-md border border-gray-700 shadow-2xl">
    <h2 class="text-2xl font-bold mb-6">Painel Admin</h2>

    <input id="email" placeholder="Email"
      class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 mb-4">

    <input id="password" type="password" placeholder="Senha"
      class="w-full p-3 rounded-lg bg-gray-800 border border-gray-700 mb-4">

    <button id="loginBtn"
      class="w-full bg-gradient-to-r from-gray-300 to-gray-100 text-black p-3 rounded-lg font-semibold hover:opacity-90">
      Entrar
    </button>

    <button id="closeModal"
      class="mt-4 w-full text-sm text-gray-400 hover:text-white">
      Cancelar
    </button>

    <div id="loginMsg" class="mt-4 text-sm"></div>
  </div>
</div>

<script>
/* ==========================
   SUPABASE CONFIG
========================== */

const SUPABASE_URL = "COLE_SUA_URL_AQUI";
const SUPABASE_ANON_KEY = "COLE_SUA_ANON_KEY_AQUI";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

function money(c){
  return (c/100).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* ==========================
   CARREGAR SITE
========================== */

async function loadSite(){
  const { data: settings } = await supabase
    .from("site_settings")
    .select("*")
    .eq("id",1)
    .single();

  const { data: kits } = await supabase
    .from("kits")
    .select("*")
    .eq("is_active",true);

  document.getElementById("hero").innerHTML = `
    <div class="rounded-3xl bg-gradient-to-b from-gray-900 to-black p-10 border border-gray-700 shadow-xl">
      <h2 class="text-4xl font-bold">${settings.site_name}</h2>
      <p class="mt-3 text-gray-400">${settings.notices}</p>
      <a href="${settings.discord_invite_url || '#'}" target="_blank"
        class="mt-6 inline-block bg-gradient-to-r from-gray-300 to-white text-black px-6 py-3 rounded-lg font-semibold hover:opacity-90">
        Entrar no Discord
      </a>
    </div>
  `;

  document.getElementById("kits").innerHTML = kits.map(k=>`
    <div class="bg-gradient-to-b from-gray-900 to-black p-6 rounded-2xl border border-gray-800 hover:scale-[1.02] transition shadow-lg">
      <h3 class="text-xl font-semibold">${k.title}</h3>
      <p class="text-gray-400 mt-2">${k.description || ""}</p>
      <div class="mt-4 text-2xl font-bold">${money(k.price_cents)}</div>
      <a href="./buy.html?kit=${k.id}"
        class="mt-6 block text-center bg-gradient-to-r from-gray-300 to-white text-black py-3 rounded-lg font-semibold hover:opacity-90">
        Comprar
      </a>
    </div>
  `).join("");
}

loadSite();

/* ==========================
   ADMIN MODAL
========================== */

const modal = document.getElementById("adminModal");

document.getElementById("adminOpen").addEventListener("click", () => {
  modal.classList.remove("hidden");
});

document.getElementById("closeModal").addEventListener("click", () => {
  modal.classList.add("hidden");
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("loginMsg");

  msg.innerHTML = "Entrando...";

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    msg.innerHTML = `<span class="text-red-400">${error.message}</span>`;
  } else {
    window.location.href = "./admin.html";
  }
});
</script>

</body>
</html>
